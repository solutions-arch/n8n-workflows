<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scale Virtually — Automated Operations Platform</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- shared SVG defs: glow filter host + tool-agnostic icon set (union of all three systems) -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <symbol id="icon-form" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="4" width="14" height="17" rx="2"/>
        <rect x="9" y="2" width="6" height="4" rx="1"/>
        <line x1="8" y1="11" x2="16" y2="11"/>
        <line x1="8" y1="15" x2="16" y2="15"/>
      </symbol>
      <symbol id="icon-sync" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12a8 8 0 0 1 13.66-5.66"/>
        <path d="M20 12a8 8 0 0 1-13.66 5.66"/>
        <path d="M18 3v5h-5"/>
        <path d="M6 21v-5h5"/>
      </symbol>
      <symbol id="icon-mic" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 11a7 7 0 0 0 14 0"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </symbol>
      <symbol id="icon-envelope" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <path d="M3 7l9 6 9-6"/>
      </symbol>
      <symbol id="icon-clock" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 7v5l3.5 2"/>
      </symbol>
      <symbol id="icon-warning" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3.5L21.5 20h-19z"/>
        <line x1="12" y1="9.5" x2="12" y2="14.5"/>
        <circle cx="12" cy="17.3" r="0.9" fill="currentColor" stroke="none"/>
      </symbol>
      <symbol id="icon-gear" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3.2"/>
        <path d="M12 3v2.2M12 18.8V21M21 12h-2.2M5.2 12H3M18.1 5.9l-1.5 1.5M7.4 16.6l-1.5 1.5M18.1 18.1l-1.5-1.5M7.4 7.4L5.9 5.9"/>
      </symbol>
      <symbol id="icon-brain" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 4a3 3 0 0 0-3 3 3 3 0 0 0-1.5 5.6A3 3 0 0 0 7 17.5 3 3 0 0 0 9.9 21a3 3 0 0 0 2.1-.9V6a2.5 2.5 0 0 0-3-2z"/>
        <path d="M15 4a3 3 0 0 1 3 3 3 3 0 0 1 1.5 5.6A3 3 0 0 1 17 17.5 3 3 0 0 1 14.1 21a3 3 0 0 1-2.1-.9V6a2.5 2.5 0 0 1 3-2z"/>
      </symbol>
      <symbol id="icon-chart" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="21" x2="21" y2="21"/>
        <rect x="5" y="14" width="3" height="7"/>
        <rect x="10.5" y="9" width="3" height="12"/>
        <rect x="16" y="4" width="3" height="17"/>
      </symbol>
      <symbol id="icon-database" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5.5" rx="8" ry="3"/>
        <path d="M4 5.5V18c0 1.66 3.58 3 8 3s8-1.34 8-3V5.5"/>
        <path d="M4 12c0 1.66 3.58 3 8 3s8-1.34 8-3"/>
      </symbol>
      <symbol id="icon-window" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <circle cx="6" cy="6.5" r="0.6" fill="currentColor" stroke="none"/>
        <circle cx="8.5" cy="6.5" r="0.6" fill="currentColor" stroke="none"/>
      </symbol>
      <symbol id="icon-checklist" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="3" width="16" height="18" rx="2"/>
        <path d="M8 8l1.5 1.5L12.5 6"/>
        <line x1="8" y1="14" x2="16" y2="14"/>
        <line x1="8" y1="17.5" x2="16" y2="17.5"/>
      </symbol>
      <symbol id="icon-chat" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 5h16v11H9l-4 4V5z"/>
        <line x1="8" y1="9" x2="16" y2="9"/>
        <line x1="8" y1="12.5" x2="13" y2="12.5"/>
      </symbol>
      <symbol id="icon-document" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2h9l4 4v16H6z"/>
        <path d="M15 2v4h4"/>
        <line x1="9" y1="12" x2="16" y2="12"/>
        <line x1="9" y1="16" x2="16" y2="16"/>
      </symbol>
      <symbol id="icon-calendar" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="16" rx="2"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="2" x2="8" y2="7"/>
        <line x1="16" y1="2" x2="16" y2="7"/>
      </symbol>
      <symbol id="icon-table" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </symbol>
      <!-- generic media placeholder icons -->
      <symbol id="icon-image" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
        <circle cx="8.5" cy="9.5" r="1.5"/>
        <path d="M21 16l-5.5-5.5L4 21"/>
      </symbol>
      <symbol id="icon-video" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="14" height="14" rx="2"/>
        <path d="M17 9.5l4-2.5v10l-4-2.5"/>
      </symbol>
      <symbol id="icon-expand" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 4H4v5"/>
        <path d="M15 4h5v5"/>
        <path d="M4 15v5h5"/>
        <path d="M20 15v5h-5"/>
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <path d="M7 4.5v15l13-7.5z"/>
      </symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <rect x="6" y="4.5" width="4.5" height="15" rx="1"/>
        <rect x="13.5" y="4.5" width="4.5" height="15" rx="1"/>
      </symbol>
    </defs>
  </svg>

  <header class="topbar">
    <a class="topbar-logo" href="#overview" data-nav="overview">Scale Virtually</a>
    <nav class="topbar-nav" aria-label="Systems">
      <a href="#pdev" data-nav="pdev">PDEV</a>
      <a href="#placements" data-nav="placements">Placements</a>
      <a href="#linkedin" data-nav="linkedin">LinkedIn Outreach</a>
    </nav>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light/dark theme">
      <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.4 4.4l1.7 1.7M17.9 17.9l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.4 19.6l1.7-1.7M17.9 6.1l1.7-1.7"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5z"/></svg>
    </button>
  </header>

  <main id="app"></main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
